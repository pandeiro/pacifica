name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Type check frontend
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Test frontend
        working-directory: frontend
        run: npm run test

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install ruff mypy
          pip install -r api/requirements.txt

      - name: Lint Python
        run: ruff check api/ scraper/ || true

      - name: Type check Python
        run: mypy api/ scraper/ || true

  build-frontend:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (Production)
        if: github.ref == 'refs/heads/main'
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Build frontend (Staging)
        if: github.event_name == 'pull_request'
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 1

  build-images:
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          build-args: |
            VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for Scraper
        id: meta-scraper
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-scraper
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Scraper image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./scraper/Dockerfile
          push: true
          tags: ${{ steps.meta-scraper.outputs.tags }}
          labels: ${{ steps.meta-scraper.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [build-frontend, build-images]
    if: always() && (needs.build-frontend.result == 'success' || needs.build-images.result == 'success')
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
      url: ${{ github.ref == 'refs/heads/main' && 'https://pch.onl' || 'https://staging.pch.onl' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend-dist/

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Add host to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          SERVICES_PATH: ${{ secrets.DEPLOY_SERVICES_PATH }}
          STATIC_PATH_PROD: ${{ secrets.DEPLOY_STATIC_PATH_PROD }}
          STATIC_PATH_STAGING: ${{ secrets.DEPLOY_STATIC_PATH_STAGING }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          set -e  # Exit on any error
          
          # Determine environment
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            STATIC_PATH=$STATIC_PATH_PROD
            IMAGE_TAG=latest
            IS_PROD=true
          else
            STATIC_PATH=$STATIC_PATH_STAGING
            IMAGE_TAG=sha-${{ github.sha }}
            IS_PROD=false
          fi
          
          # Sync frontend static files
          rsync -avz --delete frontend-dist/ $USER@$HOST:$STATIC_PATH/
          
          # Deploy backend (production only - staging shares the same API)
          if [ "$IS_PROD" = true ]; then
            # Create .env file locally
            echo "IMAGE_TAG=latest" > .env
            echo "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}" >> .env
            echo "ENVIRONMENT=production" >> .env
            echo "LOG_FORMAT=json" >> .env
            
            # Ensure directory exists and has proper permissions
            ssh $USER@$HOST "mkdir -p $SERVICES_PATH && chmod 755 $SERVICES_PATH"
            
            # Copy files to VPS
            scp .env $USER@$HOST:$SERVICES_PATH/.env
            scp docker-compose.yml $USER@$HOST:$SERVICES_PATH/docker-compose.yml
            
            # Deploy containers
            ssh $USER@$HOST "cd $SERVICES_PATH && echo $GHCR_TOKEN | docker login ghcr.io -u $GHCR_USER --password-stdin && docker compose pull && docker compose down && docker compose up -d && echo '=== Container Status ===' && docker compose ps && echo '=== API Logs (last 50 lines) ===' && docker compose logs api --tail 50 || true && docker logout ghcr.io && docker system prune -f"
          fi

      - name: Health check
        if: github.ref == 'refs/heads/main'
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -e
          
          echo "Waiting for services to start (Postgres + API need time to initialize)..."
          sleep 20
          
          echo "Waiting for API to be ready (checking from VPS)..."
          
          # Poll from VPS (API is bound to localhost:4900)
          for i in {1..60}; do
            if ssh $USER@$HOST "curl -sSf http://localhost:4900/api/health" > /dev/null 2>&1; then
              echo "✓ API is healthy!"
              exit 0
            fi
            echo "  Attempt $i/60 - API not ready yet, waiting..."
            sleep 2
          done
          
          echo "✗ Health check failed after 60 attempts"
          echo "=== Container Status ==="
          ssh $USER@$HOST "cd \$(dirname \$(find /home -name 'docker-compose.yml' 2>/dev/null | head -1)) && docker compose ps" || true
          echo "=== API Container Logs ==="
          ssh $USER@$HOST "cd \$(dirname \$(find /home -name 'docker-compose.yml' 2>/dev/null | head -1)) && docker compose logs api --tail 100" || true
          exit 1
