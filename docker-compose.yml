services:
  # PostgreSQL with TimescaleDB
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: pacifica-postgres
    environment:
      POSTGRES_DB: pacifica
      POSTGRES_USER: pacifica
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pacifica
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pacifica -d pacifica"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # FastAPI Application
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: ghcr.io/pandeiro/pacifica-api:${IMAGE_TAG:-local}
    container_name: pacifica-api
    environment:
      DATABASE_URL: postgresql+asyncpg://pacifica:${POSTGRES_PASSWORD:-password}@postgres:5432/pacifica
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_FORMAT: ${LOG_FORMAT:-pretty}
    ports:
      - "4900:4900"
    networks:
      - pacifica
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4900/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1.0"

  # Scraper Service
  scraper:
    build:
      context: .
      dockerfile: scraper/Dockerfile
    image: ghcr.io/pandeiro/pacifica-scraper:${IMAGE_TAG:-local}
    container_name: pacifica-scraper
    environment:
      DATABASE_URL: postgresql+asyncpg://pacifica:${POSTGRES_PASSWORD:-password}@postgres:5432/pacifica
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_FORMAT: ${LOG_FORMAT:-pretty}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - pacifica
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"

volumes:
  postgres_data:

networks:
  pacifica:
    driver: bridge
